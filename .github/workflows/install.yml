name: install

env:
  # 版本控制：
  # - 设置 VERSION 为空字符串时，下载 latest 版本
  # - 设置 VERSION 为具体版本号时（如 v1.2.3），下载指定版本
  MAAFW_VERSION: ""
  MXU_VERSION: ""
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "package*.json"
      - "requirements.txt"
      - "tools/requirements.txt"
      - "assets/**"
      - "resources/**"
      - "**.py"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - "package*.json"
      - "requirements.txt"
      - "tools/requirements.txt"
      - "assets/**"
      - "resources/**"
      - "**.py"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set_tag
        run: |
          # 检查标签格式
          is_release=${{ startsWith(github.ref, 'refs/tags/v') }}
          tag=$(git describe --tags --match "v*" ${{ github.ref }} || true)
          if [[ $tag != v* ]]; then
            tag=$(curl -sX GET "https://api.github.com/repos/${{ github.repository }}/releases/latest" --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' | awk '/tag_name/{print $4}' FS='["]')
            if [[ $tag != v* ]]; then
              tag="v0.0.0"
            fi
            tag=$(date "+$tag-%y%m%d-$(git rev-parse --short HEAD)")
          fi

          if [[ "$is_release" != "true" ]]; then
            prefix=${tag%-*-*}
            suffix=${tag#$prefix-}
            tag="$prefix-ci.$suffix"
          fi

          # 检查是否为预发布版本
          is_prerelease=false
          if [[ $tag =~ .*alpha.* || $tag =~ .*beta.* || $tag =~ .*rc.* || $tag =~ .*dev.* || $tag =~ .*-ci.* ]]; then
            is_prerelease=true
            echo "This is a pre-release version"
          fi

          echo tag=$tag | tee -a $GITHUB_OUTPUT
          echo is_release=$is_release | tee -a $GITHUB_OUTPUT
          echo is_prerelease=$is_prerelease | tee -a $GITHUB_OUTPUT
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_release: ${{ steps.set_tag.outputs.is_release }}
      is_prerelease: ${{ steps.set_tag.outputs.is_prerelease }}

  install:
    needs: meta
    strategy:
      matrix:
        include:
          - os: win
            arch: x86_64
            runner: windows-latest
      fail-fast: false
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download MaaFramework
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ matrix.os }}-${{ matrix.arch }}*"
          latest: ${{ env.MAAFW_VERSION == '' }}
          tag: ${{ env.MAAFW_VERSION }}
          out-file-path: "deps"
          extract: true

      - name: Setup packaged Python runtime
        run: |
          python tools/setup_python_runtime.py ${{ matrix.os }} ${{ matrix.arch }}

      - name: Install
        shell: bash
        env:
          MAA_RESONANCE_MXU_VERSION: ${{ env.MXU_VERSION }}
        run: |
          python -m pip install -r tools/requirements.txt
          python tools/install.py ${{ needs.meta.outputs.tag }} ${{ matrix.os }} ${{ matrix.arch }} --with-mxu

      - uses: actions/upload-artifact@v4
        with:
          name: MaaResonance-${{ matrix.os }}-${{ matrix.arch }}
          path: "install"

  changelog:
    name: Generate changelog
    needs: meta
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.release_notes.outputs.release_body }}
    steps:
      - name: Generate release notes
        id: release_notes
        shell: bash
        run: |
          {
            echo "release_body<<EOF"
            echo "## v1.0.0 更新日志"
            echo ""
            echo "本版本作为 MaaResonance 首个稳定版本，重点提升自动/手动双城跑商的稳定性，并优化疲劳恢复、地图选点、交易所识别等相关功能。"
            echo ""
            echo "### 新增"
            echo ""
            echo "- 支持 MirrorChyan 自动更新，用户可选免费 GitHub（需一定网络环境）节点更新或使用付费 MirrorCDK 快速节点更新"
            echo "- 更新了乘员共振数据为最新版本"
            echo "- 跑商任务配置中新增智能扫描间隔，减少同一天内多次扫描的情况发生"
            echo ""
            echo "### 优化"
            echo ""
            echo "- 优化跑商中部分算法，使其与 resonance-columba-bot 中的算法对齐"
            echo "- 优化了疲劳药使用逻辑，现在实际使用次数会与配置中的完全同步，消耗疲劳药时会自动减少配置中的数量"
            echo "- 优化了跑商中异常情况的处理，减少了脚本卡死的情况发生"
            echo "- 优化了大地图选点逻辑，减少地图拖动缓慢被弹窗打断的问题"
            echo "- 优化了疲劳计算逻辑，现在会减少因疲劳不足导致脚本卡死的情况"
            echo ""
            echo "### 修复"
            echo ""
            echo "- 修复跑商开始或途中遇到每日签到奖励弹窗时，任务可能直接失败的问题"
            echo "- 修复货仓未装满但仍继续发车的问题"
            echo "- 修复疲劳不足时仍继续执行买入、卖出或抬砍价，导致游戏弹出疲劳不足窗口从而卡死的问题"
            echo "- 修复买入前清仓抬价时没有提前检查疲劳的问题，导致游戏弹出疲劳不足窗口从而卡死的问题"
            echo "- 修复疲劳药/桦石使用次数在 MXU 配置中没有随着使用而正确减少的问题"
            echo "- 修复提神口香糖等有限次数疲劳药在配置仍有剩余时被误判为不可用的问题"
            echo "- 修复武林源交易所入口需要多次点击或点击不稳定的问题"
            echo "- 修复部分日志中可能出现重复句号的问题"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs: [meta, install, changelog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets

      - run: |
          cd assets
          for f in *; do
            (cd $f && zip -r ../$f-${{ needs.meta.outputs.tag }}.zip .)
          done
          
      - uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          tag_name: ${{ needs.meta.outputs.tag }}
          body: ${{ needs.changelog.outputs.release_body }}
          draft: false
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}

      - name: Trigger MirrorChyanUploading
        if: ${{ github.repository_owner == 'DaiMao204' }}
        shell: bash
        run: |
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release.yml -f tag=${{ needs.meta.outputs.tag }}
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release_note.yml -f tag=${{ needs.meta.outputs.tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
